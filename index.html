    subtitle: "",
    text: `Dans le Midi tout le monde est habitué au vent d\'autan, cet air venu de la mer qui échauffe les esprits et fait claquer les volets pendant des jours entiers.
On dit qu\'il rend fou.
Mais il y a des nuits à Cordes-sur-Ciel où le vent ne vient pas du sud-est.
Ces nuits-là, le souffle monte lentement, comme une respiration retenue trop longtemps. Les habitants de la cité médiévale connaissent tous cette agitation qui provient des entrailles de la colline. En premier, ils reconnaissent l\'odeur : quelque chose entre la pierre mouillée et le métal chaud. Une senteur qui n\'a pas de nom dans les dictionnaires, mais que chaque enfant né ici apprend à reconnaître avant même d\'apprendre à lire.
Ce soir-là d\'octobre 2025, c\'était une de ces nuits-là.`
  },
  {
    text: `Sur la place de la Bride, en haut de la cité, les platanes se tenaient immobiles. Aucun frémissement, aucun bruissement de feuilles. L\'air semblait suspendu, comme si quelque chose, quelque part sous les pavés, retenait son souffle en même temps que la ville entière. Les ruelles de grès ocre, les façades sculptées des grandes maisons gothiques, les bas-reliefs taillés dans les murs, tout dormait avec la même immobilité que la roche dont la ville était faite.
À Cordes-sur-Ciel, certaines choses s\'arrêtaient de fonctionner ces nuits-là. La cloche de l\'église Saint-Michel marquait minuit moins vingt-trois. Elle n\'avait pas sonné depuis plusieurs jours. Personne ne s\'en était encore vraiment inquiété et tout le monde faisait semblant de ne pas l\'avoir remarqué.
Presque tout le monde.`
  },
  {
    text: `Léna Marlhac ne dormait pas.
Elle était recroquevillée sur son lit, les genoux remontés contre la poitrine, les cheveux défaits tombant sur ses épaules. Des cheveux châtains en apparence mais qui arboraient des reflets roux seulement visibles en pleine lumière. Elle avait quatorze ans et n\'était pas toujours très à l\'aise dans son corps. Ses épaules légèrement rentrées contrastaient avec ses mains toujours en mouvement quand elle réfléchissait. Quelque chose dans sa façon d\'occuper l\'espace disait que c\'était quelqu\'un qui avait appris très tôt à regarder sans être vue.
Ce soir, ses yeux brillants comme le calcaire humide étaient fixés sur la boussole posée sur son oreiller.
L\'aiguille pointait vers le bas.`

    text: `Elle n\'avait pas dormi correctement depuis onze jours. Pas depuis la première fois qu\'elle avait entendu la voix. Enfin… "voix" n\'était pas tout à fait le bon mot. C\'était plutôt une pression à l\'intérieur des tempes, un bourdonnement grave qui se modulait, qui montait et descendait avec une intention si claire qu\'on ne pouvait pas l\'attribuer au hasard. Comme si quelqu\'un, très loin et très bas, essayait de parler dans une langue qu\'elle ne connaissait pas encore mais dont les contours lui étaient, inexplicablement, familiers.

L\'histoire de la boussole avait commencé trois semaines plus tôt, un dimanche de marché. Tout au bout de la dernière rangée, un vieux monsieur assis sur un tabouret en bois se tenait derrière une étroite table recouverte d\'un drap de velours bordeaux. Ses mains tachées d\'encre manipulaient des objets avec le soin excessif des gens qui savent exactement la valeur des choses. La boussole était à l\'écart des autres. Un boîtier de cuivre à moitié oxydé, verre légèrement bombé, aiguille fine comme une épine de rosier. Léna l\'avait prise dans sa main sans vraiment décider de le faire.

];

function Countdown() {
  const [t, setT] = React.useState({});
  React.useEffect(() => {
    const calc = () => {
      const diff = END_DATE - new Date();
      if (diff <= 0) return setT({ expired: true });
      setT({ days: Math.floor(diff/86400000), hours: Math.floor((diff/3600000)%24), minutes: Math.floor((diff/60000)%60), seconds: Math.floor((diff/1000)%60) });
    };
    calc(); const id = setInterval(calc, 1000); return () => clearInterval(id);
  }, []);
  if (t.expired) return null;
  return (
    <div style={{display:"flex",justifyContent:"center",gap:"8px",margin:"14px 0"}}>
      {[["days","j"],["hours","h"],["minutes","min"],["seconds","s"]].map(([k,l]) => (
        <div key={k} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(192,151,106,0.28)",borderRadius:"7px",padding:"8px 10px",textAlign:"center",minWidth:"46px"}}>
          <div style={{fontSize:"1.3rem",fontWeight:"700",color:"#e8c98a",fontFamily:"serif"}}>{String(t[k]??"–").padStart(2,"0")}</div>
          <div style={{fontSize:"0.58rem",color:"#a89070",textTransform:"uppercase",letterSpacing:"0.07em"}}>{l}</div>
        </div>
      ))}
    </div>
  );
}

function BookViewer() {
  const [page, setPage] = React.useState(0);
  const [isAnimating, setIsAnimating] = React.useState(false);
  const [visible, setVisible] = React.useState(true);
  const touchStartX = React.useRef(null);
  const total = PAGES.length;

  const goTo = (target) => {
    if (isAnimating || target < 0 || target > total) return;
    setVisible(false);
    setIsAnimating(true);
    setTimeout(() => { setPage(target); setVisible(true); setIsAnimating(false); }, 280);
  };

  const onTouchStart = e => { touchStartX.current = e.touches[0].clientX; };
  const onTouchEnd = e => {
    if (touchStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    touchStartX.current = null;
    if (Math.abs(dx) < 40) return;
    if (dx < 0 && page < total) goTo(page + 1);
    if (dx > 0 && page > 0) goTo(page - 1);
  };

  return (
    <div style={{marginBottom:"24px"}}>
      {page === 0 && (
        <div style={{textAlign:"center",marginBottom:"8px",fontSize:"0.68rem",color:"#7a6050",letterSpacing:"0.06em",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px"}}>
          <span>👆</span> Appuyez sur la couverture pour lire le début
        </div>
      )}
      <div onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
        onClick={() => { if (page === 0) goTo(1); }}
        style={{position:"relative",overflow:"hidden",borderRadius:"12px",cursor:page===0?"pointer":"default",boxShadow:"0 8px 32px rgba(0,0,0,0.6),0 0 0 1px rgba(192,151,106,0.2)",userSelect:"none",opacity:visible?1:0,transition:"opacity 0.28s ease"}}>
        {page === 0 ? (
          <div style={{position:"relative"}}>
            <img src={COVER_IMG} alt="La Fille du Puits" style={{width:"100%",display:"block",borderRadius:"12px"}}/>
            <div style={{position:"absolute",bottom:0,left:0,right:0,height:"80px",background:"linear-gradient(to top,rgba(14,11,7,0.85),transparent)",borderRadius:"0 0 12px 12px"}}/>
            <div style={{position:"absolute",bottom:"12px",left:0,right:0,textAlign:"center",fontSize:"0.66rem",color:"rgba(232,201,138,0.7)",letterSpacing:"0.1em"}}>← Swiper ou appuyer pour lire →</div>
          </div>
        ) : (
          <div style={{background:"linear-gradient(160deg,#1a1309,#120e07)",padding:"26px 20px 20px",minHeight:"400px",display:"flex",flexDirection:"column"}}>
            {PAGES[page-1].title && (
              <div style={{marginBottom:"16px",paddingBottom:"12px",borderBottom:"1px solid rgba(192,151,106,0.18)"}}>
                <div style={{fontSize:"0.6rem",color:"#7a6a52",textTransform:"uppercase",letterSpacing:"0.16em",marginBottom:"3px"}}>{PAGES[page-1].title}</div>
                <div style={{fontSize:"0.86rem",color:"#e8c98a",fontStyle:"italic"}}>{PAGES[page-1].subtitle}</div>
              </div>
            )}
            <div style={{flex:1,color:"#cdb898",lineHeight:"1.9",fontSize:"0.88rem",fontFamily:"Georgia,serif",whiteSpace:"pre-line"}}>{PAGES[page-1].text}</div>
            {PAGES[page-1].isLast && (
              <div style={{marginTop:"18px",padding:"14px",background:"rgba(232,201,138,0.07)",border:"1px solid rgba(232,201,138,0.2)",borderRadius:"9px",textAlign:"center"}}>
                <div style={{fontSize:"0.7rem",color:"#a89070",marginBottom:"3px"}}>La suite vous attend…</div>
                <div style={{fontSize:"0.8rem",color:"#e8c98a",fontStyle:"italic"}}>Réservez votre exemplaire ci-dessous</div>
              </div>
            )}
            <div style={{marginTop:"14px",display:"flex",alignItems:"center",justifyContent:"center",gap:"5px"}}>
              {Array.from({length:total}).map((_,i) => (
                <div key={i} style={{width:i===page-1?"16px":"5px",height:"5px",borderRadius:"3px",background:i===page-1?"#c0976a":"rgba(192,151,106,0.22)",transition:"width 0.3s ease"}}/>
              ))}
            </div>
          </div>
        )}
      </div>
      {page > 0 && (
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"10px",padding:"0 2px"}}>
          <button onClick={() => goTo(page-1)} style={{background:"none",border:"1px solid rgba(192,151,106,0.22)",borderRadius:"7px",padding:"7px 12px",color:"#c0976a",cursor:"pointer",fontSize:"0.76rem"}}>
            ← {page===1?"Couverture":"Précédent"}
          </button>
          <span style={{fontSize:"0.62rem",color:"#5a4a35"}}>{page} / {total}</span>
          {page < total
            ? <button onClick={() => goTo(page+1)} style={{background:"none",border:"1px solid rgba(192,151,106,0.22)",borderRadius:"7px",padding:"7px 12px",color:"#c0976a",cursor:"pointer",fontSize:"0.76rem"}}>Suivant →</button>
            : <div style={{width:"80px"}}/>
          }
        </div>
      )}
    </div>
  );
}

function PaymentForm({qty, total, onBack}) {
  const [form, setForm] = React.useState({nom:"",prenom:"",email:"",tel:"",adresse:""});
  const [errors, setErrors] = React.useState({});

  const validate = () => {
    const e={};
    if(!form.nom.trim()) e.nom="Requis";
    if(!form.prenom.trim()) e.prenom="Requis";
    if(!form.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) e.email="Email invalide";
    if(!form.tel.trim()) e.tel="Requis";
    if(!form.adresse.trim()) e.adresse="Requis";
    return e;
  };

  const handlePay = async () => {
    const e=validate(); if(Object.keys(e).length) return setErrors(e);

    const date = new Date().toLocaleDateString("fr-FR");
    const order = {...form, qty, total, date, status: "commandé"};

    // 1. Sauvegarder localement
    try {
      const r = await storage.get("orders");
      const ex = r?.value ? JSON.parse(r.value) : [];
      await storage.set("orders", JSON.stringify([...ex, order]));
    } catch(err) { console.warn("Storage:", err); }

    // 2. Envoyer email — on attend avant de rediriger
    try {
      emailjs.init("xc_br9eKp8IUDvDzS");
      const res = await emailjs.send("service_uzaoqc9", "template_vrie1py", {
        to_email: form.email,
        prenom: form.prenom,
        nom: form.nom,
        email: form.email,
        tel: form.tel,
        adresse: form.adresse,
        qty: String(qty),
        total: String(total),
        date: date,
      });
      console.log("EmailJS OK:", res.status);
    } catch(err) { console.warn("EmailJS:", err); }

    // 3. Rediriger vers Stripe après envoi email
    const base = "https://buy.stripe.com/4gMaEXdcd7Qs4dGbUZ14400";
    const params = new URLSearchParams({
      prefilled_email: form.email,
      quantity: String(qty),
      client_reference_id: `${form.prenom}-${form.nom}-${Date.now()}`,
    });
    window.location.href = `${base}?${params.toString()}`;
  };

  const fi = (key,label,type="text",opts={}) => (
    <div style={{marginBottom:"12px"}}>
      <label style={{display:"block",marginBottom:"4px",color:"#c0976a",fontSize:"0.72rem",letterSpacing:"0.07em",textTransform:"uppercase"}}>{label}</label>
      {opts.ta
        ? <textarea rows={2} value={form[key]} onChange={e=>{setForm({...form,[key]:e.target.value});setErrors({...errors,[key]:""});}} style={{width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.05)",border:errors[key]?"1px solid #e07070":"1px solid rgba(192,151,106,0.28)",borderRadius:"8px",padding:"10px 12px",color:"#f0e6d0",fontSize:"0.88rem",outline:"none",resize:"none"}}/>
        : <input type={type} value={form[key]} onChange={e=>{setForm({...form,[key]:e.target.value});setErrors({...errors,[key]:""});}} style={{width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.05)",border:errors[key]?"1px solid #e07070":"1px solid rgba(192,151,106,0.28)",borderRadius:"8px",padding:"10px 12px",color:"#f0e6d0",fontSize:"0.88rem",outline:"none"}}/>
      }
      {errors[key] && <span style={{color:"#e07070",fontSize:"0.68rem"}}>{errors[key]}</span>}
    </div>
  );

  return (
    <div style={{paddingTop:"18px"}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#a89070",cursor:"pointer",fontSize:"0.8rem",marginBottom:"12px"}}>← Retour</button>
      <h2 style={{color:"#e8c98a",marginBottom:"3px",fontSize:"1.1rem"}}>Finaliser ma commande</h2>
      <p style={{color:"#7a6a55",fontSize:"0.76rem",marginBottom:"18px"}}>
        {qty} exemplaire{qty>1?"s":""} · <strong style={{color:"#e8c98a"}}>{total} €</strong> · Livraison à partir du 01/10/2026
      </p>

      <div style={{fontSize:"0.68rem",color:"#a89070",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"12px"}}>Vos coordonnées</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px"}}>{fi("prenom","Prénom")}{fi("nom","Nom")}</div>
      {fi("email","E-mail","email")}{fi("tel","Téléphone","tel")}{fi("adresse","Adresse de livraison","text",{ta:true})}

      <div style={{background:"rgba(232,201,138,0.06)",border:"1px solid rgba(232,201,138,0.18)",borderRadius:"12px",padding:"14px",margin:"16px 0",textAlign:"center"}}>
        <div style={{fontSize:"0.7rem",color:"#a89070",marginBottom:"6px"}}>Vous allez être redirigé vers le paiement sécurisé</div>
        <div style={{display:"flex",justifyContent:"center",gap:"8px"}}>
          {["VISA","Mastercard","CB","Apple Pay","Google Pay"].map(b=>(
            <span key={b} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"4px",padding:"3px 7px",fontSize:"0.6rem",color:"#a89070"}}>{b}</span>
          ))}
        </div>
      </div>

      <button onClick={handlePay} style={{width:"100%",background:"linear-gradient(135deg,#c0976a,#a07848)",border:"none",borderRadius:"11px",padding:"15px",color:"#0e0b07",fontSize:"0.95rem",fontWeight:"700",cursor:"pointer",boxShadow:"0 4px 18px rgba(192,151,106,0.3)",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"}}>
        <span>🔒</span> Payer {total} € en sécurité →
      </button>
      <p style={{color:"#3a2c1a",fontSize:"0.66rem",textAlign:"center",marginTop:"8px"}}>
        Paiement sécurisé par Stripe · Vos données sont protégées
      </p>
    </div>
  );
}

function AdminPanel({orders, onExport, onClose}) {
  const total = orders.reduce((s,o)=>s+Number(o.qty)*PRICE_PROMO,0);
  const qty = orders.reduce((s,o)=>s+Number(o.qty),0);
  return (
    <div style={{paddingTop:"20px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
        <h2 style={{color:"#e8c98a",margin:0,fontSize:"1.1rem"}}>Tableau de bord</h2>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#a89070",cursor:"pointer",fontSize:"0.78rem"}}>Fermer ×</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginBottom:"14px"}}>
        {[[orders.length,"commandes"],[qty,"exemplaires"],[total.toFixed(2)+" €","encaissé"]].map(([v,l])=>(
          <div key={l} style={{background:"rgba(232,201,138,0.07)",border:"1px solid rgba(232,201,138,0.18)",borderRadius:"9px",padding:"11px",textAlign:"center"}}>
            <div style={{fontSize:"1.3rem",color:"#e8c98a",fontWeight:"700"}}>{v}</div>
            <div style={{fontSize:"0.6rem",color:"#a89070",textTransform:"uppercase",marginTop:"2px"}}>{l}</div>
          </div>
        ))}
      </div>
      {orders.length===0
        ? <p style={{color:"#a89070",textAlign:"center",fontStyle:"italic",padding:"16px 0"}}>Aucune commande.</p>
        : <>
          <button onClick={onExport} style={{width:"100%",background:"rgba(192,151,106,0.09)",border:"1px solid rgba(192,151,106,0.28)",borderRadius:"8px",color:"#c0976a",padding:"9px",cursor:"pointer",fontSize:"0.78rem",marginBottom:"12px"}}>⬇ Exporter CSV</button>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:"0.7rem",color:"#c8b898"}}>
              <thead><tr style={{borderBottom:"1px solid rgba(192,151,106,0.22)"}}>
                {["Date","Nom","Email","Tél","Adresse","Qté","Total"].map(h=><th key={h} style={{padding:"5px 6px",textAlign:"left",color:"#c0976a",fontWeight:"600",whiteSpace:"nowrap"}}>{h}</th>)}
              </tr></thead>
              <tbody>{orders.map((o,i)=>(
                <tr key={i} style={{borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                  <td style={{padding:"5px 6px",whiteSpace:"nowrap"}}>{o.date}</td>
                  <td style={{padding:"5px 6px",whiteSpace:"nowrap"}}>{o.prenom} {o.nom}</td>
                  <td style={{padding:"5px 6px"}}>{o.email}</td>
                  <td style={{padding:"5px 6px"}}>{o.tel}</td>
                  <td style={{padding:"5px 6px",maxWidth:"90px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.adresse}</td>
                  <td style={{padding:"5px 6px",textAlign:"center"}}>{o.qty}</td>
                  <td style={{padding:"5px 6px",whiteSpace:"nowrap"}}>{(o.qty*PRICE_PROMO).toFixed(2)}€</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </>
      }
    </div>
  );
}

function App() {
  const [view, setView] = React.useState("home");
  const [qty, setQty] = React.useState(1);
  const [successData, setSuccessData] = React.useState(null);
  const [orders, setOrders] = React.useState([]);
  const [adminPwd, setAdminPwd] = React.useState("");
  const [adminUnlocked, setAdminUnlocked] = React.useState(false);
  const [adminError, setAdminError] = React.useState("");

  React.useEffect(()=>{
    (async()=>{ try{ const r=await storage.get("orders"); if(r?.value) setOrders(JSON.parse(r.value)); }catch{} })();
  },[]);

  const exportCSV = () => {
    const h=["Date","Prénom","Nom","Email","Téléphone","Adresse","Quantité","Total €"];
    const rows=orders.map(o=>[o.date,o.prenom,o.nom,o.email,o.tel,`"${o.adresse}"`,o.qty,(o.qty*PRICE_PROMO).toFixed(2)]);
    const csv=[h,...rows].map(r=>r.join(";")).join("\n");
    const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"})); a.download="precommandes.csv"; a.click();
  };

  const total = (qty*PRICE_PROMO).toFixed(2);

  const Shell = ({children}) => (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0e0b07 0%,#1c1308 50%,#0f0c09 100%)",fontFamily:"Georgia,serif",color:"#f0e6d0",display:"flex",flexDirection:"column",alignItems:"center",paddingBottom:"60px"}}>
      <div style={{width:"100%",textAlign:"center",padding:"16px 20px",borderBottom:"1px solid rgba(192,151,106,0.16)",background:"linear-gradient(90deg,transparent,rgba(192,151,106,0.06),transparent)"}}>
        <div style={{fontSize:"0.58rem",color:"#6a5a45",letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:"2px"}}>La Bête de Mordagne · Tome I</div>
        <div style={{fontSize:"1.55rem",fontWeight:"700",color:"#e8c98a",letterSpacing:"0.03em"}}>La Fille du Puits</div>
        <div style={{fontSize:"0.66rem",color:"#5a4a38",marginTop:"2px",fontStyle:"italic"}}>Julien Malaval</div>
      </div>
      <div style={{width:"100%",maxWidth:"480px",padding:"0 16px"}}>{children}</div>
      <div style={{marginTop:"40px"}}>
        <span onClick={()=>setView("admin")} style={{color:"#161009",fontSize:"0.5rem",cursor:"pointer",userSelect:"none"}}>⬤</span>
      </div>
    </div>
  );

  if (view==="home") return (
    <Shell>
      <div style={{paddingTop:"22px"}}>
        <div style={{textAlign:"center",marginBottom:"16px"}}>
          <span style={{display:"inline-block",background:"linear-gradient(135deg,rgba(232,201,138,0.14),rgba(192,151,106,0.06))",border:"1px solid rgba(192,151,106,0.4)",borderRadius:"20px",padding:"4px 14px",fontSize:"0.65rem",letterSpacing:"0.14em",color:"#c0976a",textTransform:"uppercase"}}>
            ✦ Prévente exclusive · 20/07 → 31/08 ✦
          </span>
        </div>
        <div style={{background:"rgba(232,201,138,0.055)",border:"1px solid rgba(232,201,138,0.18)",borderRadius:"14px",padding:"16px",marginBottom:"4px",textAlign:"center"}}>
          <div style={{fontSize:"0.64rem",color:"#a89070",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"6px"}}>Prix de prévente exclusif</div>
          <div style={{display:"flex",alignItems:"baseline",justifyContent:"center",gap:"12px"}}>
            <span style={{fontSize:"2.1rem",fontWeight:"700",color:"#e8c98a"}}>{PRICE_PROMO.toFixed(2)} €</span>
            <span style={{fontSize:"0.88rem",color:"#4a3a28",textDecoration:"line-through"}}>{PRICE_NORMAL.toFixed(2)} €</span>
          </div>
          <div style={{fontSize:"0.72rem",color:"#8fca8f",marginTop:"4px"}}>Vous économisez {(PRICE_NORMAL-PRICE_PROMO).toFixed(2)} € · Sortie à partir du 01/10/2026</div>
        </div>
        <Countdown />
        <div style={{display:"flex",alignItems:"center",gap:"10px",margin:"18px 0"}}>
          <div style={{flex:1,height:"1px",background:"linear-gradient(to right,transparent,rgba(192,151,106,0.25))"}}/>
          <span style={{color:"#c0976a",fontSize:"0.65rem"}}>✦</span>
          <div style={{flex:1,height:"1px",background:"linear-gradient(to left,transparent,rgba(192,151,106,0.25))"}}/>
        </div>
        <BookViewer />
        <div style={{display:"flex",alignItems:"center",gap:"10px",margin:"18px 0 20px"}}>
          <div style={{flex:1,height:"1px",background:"linear-gradient(to right,transparent,rgba(192,151,106,0.25))"}}/>
          <span style={{color:"#c0976a",fontSize:"0.65rem"}}>✦</span>
          <div style={{flex:1,height:"1px",background:"linear-gradient(to left,transparent,rgba(192,151,106,0.25))"}}/>
        </div>
        <div style={{background:"rgba(255,255,255,0.022)",border:"1px solid rgba(192,151,106,0.15)",borderRadius:"12px",padding:"16px",marginBottom:"20px"}}>
          <div style={{fontSize:"0.63rem",color:"#c0976a",textTransform:"uppercase",letterSpacing:"0.12em",textAlign:"center",marginBottom:"13px"}}>Comment fonctionne la prévente ?</div>
          {[["Choisissez le nombre d'exemplaires","Indiquez la quantité souhaitée."],["Payez en ligne","Paiement CB immédiat et sécurisé."],["Recevez le livre à partir du 01/10/2026","Expédié par courrier dès la sortie."]].map(([titre,desc],i)=>(
            <div key={i} style={{display:"flex",gap:"11px",marginBottom:i<2?"11px":"0"}}>
              <div style={{minWidth:"22px",height:"22px",borderRadius:"50%",background:"rgba(192,151,106,0.15)",border:"1px solid rgba(192,151,106,0.35)",display:"flex",alignItems:"center",justifyContent:"center",color:"#e8c98a",fontSize:"0.68rem",fontWeight:"700",flexShrink:0}}>{i+1}</div>
              <div><div style={{color:"#e8c98a",fontSize:"0.8rem",fontWeight:"600",marginBottom:"1px"}}>{titre}</div><div style={{color:"#8a7a65",fontSize:"0.73rem",lineHeight:"1.45"}}>{desc}</div></div>
            </div>
          ))}
        </div>
        <div style={{background:"rgba(255,255,255,0.028)",border:"1px solid rgba(192,151,106,0.18)",borderRadius:"12px",padding:"16px",marginBottom:"10px"}}>
          <div style={{fontSize:"0.63rem",color:"#a89070",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"11px",textAlign:"center"}}>Nombre d'exemplaires</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"18px",marginBottom:"14px"}}>
            <button onClick={()=>setQty(Math.max(1,qty-1))} style={{width:"34px",height:"34px",borderRadius:"50%",border:"1px solid rgba(192,151,106,0.36)",background:"rgba(255,255,255,0.04)",color:"#e8c98a",fontSize:"1.2rem",cursor:"pointer"}}>−</button>
            <span style={{color:"#e8c98a",fontSize:"1.55rem",fontWeight:"700",minWidth:"30px",textAlign:"center"}}>{qty}</span>
            <button onClick={()=>setQty(qty+1)} style={{width:"34px",height:"34px",borderRadius:"50%",border:"1px solid rgba(192,151,106,0.36)",background:"rgba(255,255,255,0.04)",color:"#e8c98a",fontSize:"1.2rem",cursor:"pointer"}}>+</button>
          </div>
          <button onClick={()=>setView("form")} style={{width:"100%",background:"linear-gradient(135deg,#c0976a,#a07848)",border:"none",borderRadius:"11px",padding:"14px",color:"#0e0b07",fontSize:"0.95rem",fontWeight:"700",cursor:"pointer",boxShadow:"0 4px 18px rgba(192,151,106,0.3)"}}>
            Commander {qty} exemplaire{qty>1?"s":""} — {total} € →
          </button>
        </div>
        <div style={{fontSize:"0.63rem",color:"#4a3a25",textAlign:"center"}}>Paiement sécurisé · Aucun frais cachés · Livraison par courrier</div>
      </div>
    </Shell>
  );

  if (view==="form") return <Shell><PaymentForm qty={qty} total={total} onBack={()=>setView("home")}/></Shell>;

  if (view==="success") return (
    <Shell>
      <div style={{textAlign:"center",paddingTop:"50px"}}>
        <div style={{fontSize:"2.2rem",marginBottom:"11px",color:"#e8c98a"}}>✦</div>
        <h2 style={{color:"#e8c98a",fontSize:"1.25rem",marginBottom:"9px"}}>Commande confirmée !</h2>
        <p style={{color:"#b0a090",lineHeight:"1.7",marginBottom:"6px"}}>Merci <strong style={{color:"#e8c98a"}}>{successData?.prenom}</strong>, votre paiement a été accepté.</p>
        <p style={{color:"#b0a090",fontSize:"0.84rem",marginBottom:"24px"}}>Un récapitulatif sera envoyé à <strong style={{color:"#c0976a"}}>{successData?.email}</strong>. Votre exemplaire sera expédié le <strong style={{color:"#e8c98a"}}>01/10/2026</strong>.</p>
        <div style={{background:"rgba(143,202,143,0.07)",border:"1px solid rgba(143,202,143,0.2)",borderRadius:"11px",padding:"13px",marginBottom:"26px",fontSize:"0.8rem",color:"#8fca8f",lineHeight:"1.6"}}>
          {qty} exemplaire{qty>1?"s":""} · {total} € payé · {successData?.adresse?.split("\n")?.[0]}
        </div>
        <button onClick={()=>{setView("home");setQty(1);setSuccessData(null);}} style={{background:"rgba(192,151,106,0.1)",border:"1px solid rgba(192,151,106,0.3)",borderRadius:"9px",padding:"10px 22px",color:"#c0976a",cursor:"pointer",fontSize:"0.82rem"}}>Retour à l'accueil</button>
      </div>
    </Shell>
  );

  if (view==="admin") {
    if (!adminUnlocked) return (
      <Shell>
        <div style={{paddingTop:"50px",textAlign:"center"}}>
          <div style={{fontSize:"0.65rem",color:"#c0976a",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"16px"}}>Espace auteur</div>
          <input type="password" placeholder="Mot de passe" value={adminPwd}
            onChange={e=>{setAdminPwd(e.target.value);setAdminError("");}}
            onKeyDown={e=>e.key==="Enter"&&(adminPwd==="mordagne2026"?setAdminUnlocked(true):setAdminError("Incorrect"))}
            style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(192,151,106,0.28)",borderRadius:"8px",padding:"11px 14px",color:"#f0e6d0",fontSize:"0.95rem",outline:"none",width:"160px",textAlign:"center"}}/>
          {adminError && <div style={{color:"#e07070",fontSize:"0.72rem",marginTop:"6px"}}>{adminError}</div>}
          <br/>
          <button onClick={()=>adminPwd==="mordagne2026"?setAdminUnlocked(true):setAdminError("Incorrect")} style={{marginTop:"11px",background:"rgba(192,151,106,0.13)",border:"1px solid rgba(192,151,106,0.35)",borderRadius:"8px",padding:"8px 18px",color:"#e8c98a",cursor:"pointer"}}>Entrer</button>
          <br/>
          <button onClick={()=>setView("home")} style={{background:"none",border:"none",color:"#3a2c1a",cursor:"pointer",marginTop:"12px",fontSize:"0.72rem"}}>← Retour</button>
        </div>
      </Shell>
    );
    return <Shell><AdminPanel orders={orders} onExport={exportCSV} onClose={()=>{setView("home");setAdminUnlocked(false);setAdminPwd("");}}/></Shell>;
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
